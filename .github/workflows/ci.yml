name: CI

# Build + deploy pipeline for master:
#
#   push ──► e2e (full-stack Playwright gate, ephemeral CI Postgres)
#             └─► image-smoke (build the real Docker images + boot them)
#                   └─► backend-image  ┐  push to GHCR
#                   └─► storefront-image┘  (tags :latest + :sha-<commit>)
#                         └─► deploy ──► railway redeploy (pulls the new images)
#
# Railway no longer builds from the repo — each service deploys the prebuilt
# GHCR image, and the deploy job below triggers the redeploy. e2e + image-smoke
# both gate everything: a red run blocks image push and deploy. e2e exercises the
# app from source (devDeps present); image-smoke boots the pruned production
# images so runtime deps misfiled as devDependencies can't slip through. Both
# stacks are self-contained (CI Postgres, no external services/secrets) and never
# touch production. See .github/workflows/README.md.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; image jobs opt into packages:write.
permissions:
  contents: read

jobs:
  e2e:
    name: Build + full-stack e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # ── Backend ──────────────────────────────────────────────────────────
      # development here so pnpm installs devDependencies (build tooling) and the
      # backend behaves like local dev. The storefront *build/start* override to
      # production per-step (next build breaks under NODE_ENV=development).
      NODE_ENV: development
      DATABASE_URL: postgres://test_medusa_user:test_pw@localhost:5432/test_medusa_db
      JWT_SECRET: supersecret
      COOKIE_SECRET: supersecret
      ADMIN_CORS: http://localhost:7000,http://localhost:7001,http://localhost:9000
      AUTH_CORS: http://localhost:7000,http://localhost:7001,http://localhost:9000,http://localhost:8000
      STORE_CORS: http://localhost:8000
      MEDUSA_ADMIN_EMAIL: admin@medusa-test.com
      MEDUSA_ADMIN_PASSWORD: supersecret
      # No MOLONI_*/STRIPE_*/MINIO_*/MEILISEARCH_* → those modules stay disabled
      # in CI (local fallbacks), so the gate needs no external services/secrets.

      # ── Storefront (public env) ──────────────────────────────────────────
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: http://localhost:9000
      NEXT_PUBLIC_BASE_URL: http://localhost:8000
      NEXT_PUBLIC_DEFAULT_REGION: dk

      # ── e2e DB harness (storefront/e2e/.env.example) ─────────────────────
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
      TEST_POSTGRES_USER: test_medusa_user
      TEST_POSTGRES_PASSWORD: test_pw
      TEST_POSTGRES_DATABASE: test_medusa_db
      TEST_POSTGRES_DATABASE_TEMPLATE: test_medusa_db_template
      TEST_POSTGRES_HOST: localhost
      PRODUCTION_POSTGRES_DATABASE: medusa_db
      CLIENT_SERVER: http://localhost:9000
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: |
            backend/pnpm-lock.yaml
            storefront/pnpm-lock.yaml

      - name: Create test database and role
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 <<'SQL'
            CREATE ROLE test_medusa_user WITH LOGIN PASSWORD 'test_pw' CREATEDB;
            CREATE DATABASE test_medusa_db OWNER test_medusa_user;
          SQL

      # ── Backend ────────────────────────────────────────────────────────
      - name: Install backend deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Build backend
        working-directory: backend
        run: pnpm build

      - name: Start backend (migrate + seed + serve)
        working-directory: backend
        run: |
          # `pnpm start` runs init-backend (migrations + base seed + admin user)
          # then serves on :9000.
          nohup pnpm start > /tmp/backend.log 2>&1 &
          echo "Waiting for backend health…"
          npx --yes wait-on -t 180000 http://localhost:9000/health
          echo "Backend up."

      # ── Storefront ───────────────────────────────────────────────────────
      - name: Install storefront deps
        working-directory: storefront
        run: pnpm install --frozen-lockfile

      - name: Build storefront
        working-directory: storefront
        # launch-storefront waits for the backend and resolves the publishable key.
        # Must be production — next build breaks the /500 prerender under development.
        env:
          NODE_ENV: production
        run: pnpm build

      - name: Install Playwright browser
        working-directory: storefront
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e smoke tests
        working-directory: storefront
        # Playwright's webServer starts the storefront (pnpm start) and waits for
        # it — do NOT pre-start it here, or the port collides. Production so
        # `next start` serves the production build. Uses the v2-correct smoke
        # suite (the bundled legacy e2e suite targets Medusa v1).
        env:
          NODE_ENV: production
          # Storefront is served over http://localhost in CI, so auth/cart
          # cookies must not be Secure (test-only; never set in production).
          MEDUSA_INSECURE_COOKIES: "true"
        run: pnpm test-e2e:smoke

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: storefront/playwright-report
          retention-days: 7

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "===== backend.log ====="; tail -n 200 /tmp/backend.log || true
          echo "===== storefront.log ====="; tail -n 200 /tmp/storefront.log || true

  # ── Image boot smoke test ────────────────────────────────────────────────
  # Builds the ACTUAL Docker images and boots them. The e2e job above installs
  # with devDependencies present and runs `pnpm start`/`next start` directly, so
  # it never exercises the image's `pnpm prune --prod` tree — runtime deps that
  # are misfiled under devDependencies (e.g. react for the email templates,
  # ansi-colors for next.config) pass e2e but crash the deployed image. This job
  # closes that gap: it runs on PRs + master and gates the image push + deploy.
  image-smoke:
    name: Image boot smoke test
    needs: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the backend image locally (shares the gha cache scope with the
      # backend-image push job, so that job rebuilds from cache, not from zero).
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          load: true
          tags: backend:smoke
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Create smoke database
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE smoke_db;"

      # Pre-migrate so init-backend's checkIfSeeded sees the schema and SKIPS
      # seeding — mirroring production's already-seeded boot path (the path that
      # runs `cd .medusa/server && medusa db:migrate && medusa start`). sslmode is
      # disabled because the CI Postgres has no SSL (prod's does).
      - name: Pre-migrate the smoke database
        env:
          SMOKE_DB_URL: postgres://postgres:postgres@localhost:5432/smoke_db?sslmode=disable
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$SMOKE_DB_URL" \
            -e JWT_SECRET=smoke -e COOKIE_SECRET=smoke \
            -e MOLONI_CLIENT_ID=dummy -e MOLONI_CLIENT_SECRET=dummy \
            -e MOLONI_USER=dummy -e MOLONI_PASSWORD=dummy -e MOLONI_COMPANY_ID=1 \
            -w /app/.medusa/server --entrypoint sh backend:smoke \
            -c "./node_modules/.bin/medusa db:migrate"

      - name: Boot backend image and assert /health
        env:
          SMOKE_DB_URL: postgres://postgres:postgres@localhost:5432/smoke_db?sslmode=disable
        run: |
          docker run -d --name backend-smoke --network host \
            -e DATABASE_URL="$SMOKE_DB_URL" \
            -e JWT_SECRET=smoke -e COOKIE_SECRET=smoke \
            -e MEDUSA_ADMIN_EMAIL=admin@smoke.test -e MEDUSA_ADMIN_PASSWORD=supersecret123 \
            -e STORE_CORS=http://localhost:8000 \
            -e ADMIN_CORS=http://localhost:9000 \
            -e AUTH_CORS=http://localhost:9000 \
            -e MOLONI_CLIENT_ID=dummy -e MOLONI_CLIENT_SECRET=dummy \
            -e MOLONI_USER=dummy -e MOLONI_PASSWORD=dummy -e MOLONI_COMPANY_ID=1 \
            backend:smoke
          echo "Waiting for backend image health…"
          npx --yes wait-on -t 180000 http://localhost:9000/health
          echo "Backend image booted healthy."

      - name: Backend image logs on failure
        if: failure()
        run: docker logs backend-smoke 2>&1 | tail -n 200 || true

      # Storefront: build args are inlined by `next build`; values are dummy
      # because we only assert the server boots (next.config -> check-env-variables
      # must resolve its runtime deps in the pruned image). The backend booted
      # above is reachable at localhost:9000 for any on-demand rendering.
      - name: Build storefront image
        uses: docker/build-push-action@v6
        with:
          context: storefront
          load: true
          tags: storefront:smoke
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=http://localhost:9000
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=pk_smoke_dummy
            NEXT_PUBLIC_BASE_URL=http://localhost:8000
            NEXT_PUBLIC_DEFAULT_REGION=dk

      - name: Boot storefront image and assert it serves
        run: |
          docker run -d --name storefront-smoke --network host \
            -e PORT=8000 storefront:smoke
          echo "Waiting for storefront to listen…"
          npx --yes wait-on -t 120000 tcp:127.0.0.1:8000
          # Any HTTP status (even an error page) proves `next start` booted;
          # 000 means the process crashed (e.g. a pruned runtime dep).
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || echo 000)
          echo "storefront / -> HTTP $code"
          test "$code" != "000"

      - name: Storefront image logs on failure
        if: failure()
        run: docker logs storefront-smoke 2>&1 | tail -n 200 || true

  # ── Backend image ──────────────────────────────────────────────────────────
  backend-image:
    name: Build + push backend image
    needs: [e2e, image-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Storefront image ─────────────────────────────────────────────────────
  storefront-image:
    name: Build + push storefront image
    needs: [e2e, image-smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/storefront
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: storefront
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
          # NEXT_PUBLIC_* are inlined at build time → must match production. Set
          # these as repo-level Actions *Variables* (Settings → Secrets and
          # variables → Actions → Variables); they are public values, not secrets.
          # Missing NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY fails the build by design.
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_REGION=${{ vars.NEXT_PUBLIC_DEFAULT_REGION }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ vars.NEXT_PUBLIC_MINIO_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_ENDPOINT=${{ vars.NEXT_PUBLIC_SEARCH_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_API_KEY=${{ vars.NEXT_PUBLIC_SEARCH_API_KEY }}
            NEXT_PUBLIC_INDEX_NAME=${{ vars.NEXT_PUBLIC_INDEX_NAME }}

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    needs: [backend-image, storefront-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Redeploy Railway services
        env:
          # Railway *project* token scoped to the production environment.
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          BACKEND_SERVICE: ${{ vars.RAILWAY_BACKEND_SERVICE }}
          STOREFRONT_SERVICE: ${{ vars.RAILWAY_STOREFRONT_SERVICE }}
        run: |
          npm install -g @railway/cli@latest
          # Each service is configured (in the Railway dashboard) to deploy the
          # GHCR :latest image; redeploy re-pulls the freshly pushed tag.
          railway redeploy --service "$BACKEND_SERVICE" --yes
          railway redeploy --service "$STOREFRONT_SERVICE" --yes
