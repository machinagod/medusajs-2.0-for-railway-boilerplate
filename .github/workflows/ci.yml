name: CI

# Build + deploy pipeline for master:
#
#   push ──► backend-image  ┐  build ONCE (load) → boot-smoke → push to GHCR
#           storefront-image┘  (:latest + :sha-<commit>, GIT_SHA baked in)
#                   └─► deploy (railway redeploy --from-source, then WAIT until
#                       prod /version + /api/healthcheck report the new commit)
#                         └─► e2e-prod (read-only Playwright against LIVE prod)
#
# Each app's image is built a SINGLE time: the same job builds it (load: true),
# boots the real container as a smoke gate (catches runtime deps misfiled as
# devDependencies), and — only on push to master, only if the boot passed —
# pushes that exact image to GHCR (no rebuild). PRs build + boot but never push.
# image-smoke boot uses an ephemeral CI Postgres (no secrets, never touches
# prod); prod e2e is post-deploy and strictly read-only. See README.md.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded PR runs, but NEVER cancel a master run: cancelling mid-build
# kills the image push before it reaches GHCR, then the deploy job redeploys a
# stale image and times out waiting for the new SHA. On master, runs queue so
# each commit fully builds → pushes → deploys.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege by default; image jobs opt into packages:write.
permissions:
  contents: read

jobs:
  # Detect which app changed so single-app pushes skip the other app's heavy
  # image build / boot / push / redeploy. A change to ci.yml counts as both apps.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      storefront: ${{ steps.filter.outputs.storefront }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            storefront:
              - 'storefront/**'
              - '.github/workflows/ci.yml'

  # ── Patch coverage gate (PRs only) ─────────────────────────────────────────
  # Enforces >=90% line coverage on the lines CHANGED in the PR, across backend
  # (Jest) and storefront (Vitest), via diff-cover. New/edited logic must be
  # tested; untested legacy code is not penalised. The backend run additionally
  # holds the competitor-prices module to 90% line+branch (jest threshold).
  # lcov paths are prefixed to repo-root form so they match the git diff.
  coverage:
    name: Patch coverage (changed lines >= 90%)
    needs: [changes]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      # No pnpm cache here on purpose: the install steps below are conditional
      # (skipped on docs-only PRs), so enabling `cache: pnpm` makes setup-node's
      # post-step fail trying to save a store that was never created.
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install diff-cover
        run: pip install "diff-cover>=9"

      - name: Backend coverage (Jest)
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: |
          pnpm install --frozen-lockfile
          pnpm test:coverage
          sed -i 's#^SF:#SF:backend/#' coverage/lcov.info

      - name: Storefront coverage (Vitest)
        if: needs.changes.outputs.storefront == 'true'
        working-directory: storefront
        run: |
          pnpm install --frozen-lockfile
          pnpm test:coverage
          sed -i 's#^SF:#SF:storefront/#' coverage/lcov.info

      - name: Enforce patch coverage (>= 90% of changed lines)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -e
          reports=""
          [ -f backend/coverage/lcov.info ] && reports="$reports backend/coverage/lcov.info"
          [ -f storefront/coverage/lcov.info ] && reports="$reports storefront/coverage/lcov.info"
          if [ -z "$reports" ]; then
            echo "No coverage reports — no covered app changed."; exit 0
          fi
          diff-cover $reports \
            --compare-branch "origin/${BASE_REF}" \
            --fail-under 90 \
            --markdown-report diff-cover.md
          cat diff-cover.md >> "$GITHUB_STEP_SUMMARY" || true

  # ── Backend image: build once → boot-smoke → push ──────────────────────────
  # Builds the ACTUAL production image a single time (load: true), boots it to
  # assert it serves /health (booting the pruned image catches runtime deps
  # misfiled under devDependencies, e.g. react for email templates), and — only
  # on push to master, only after the boot passes — pushes that same image to
  # GHCR. No second build.
  backend-image:
    name: Backend image (build · boot · push)
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
        id: buildx

      # Persist the pnpm store across runs. The image's layer cache (type=gha)
      # skips the root install when the lockfile is unchanged — but postBuild then
      # `pnpm i --prod`s a fresh .medusa/server tree inside the same RUN, so on a
      # cold runner that re-downloads every prod dep (the bulk of the 7-min build).
      # cache-dance restores /pnpm/store before the build so postBuild hardlinks
      # from a warm store instead of downloading.
      - name: pnpm store cache
        id: pnpm-store
        uses: actions/cache@v4
        with:
          path: .pnpm-store-backend
          key: pnpm-store-backend-${{ hashFiles('backend/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-backend-
      - name: Inject pnpm store into the build
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              ".pnpm-store-backend": "/pnpm/store"
            }
          skip-extraction: ${{ steps.pnpm-store.outputs.cache-hit == 'true' }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Build ONCE, load into the local docker store with the final GHCR tags
      # (plus a local `backend:ci` tag used by the boot steps below). The push
      # step later just `docker push`es these already-built tags — no rebuild.
      - name: Build backend image (load)
        uses: docker/build-push-action@v6
        with:
          context: backend
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            backend:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Bakes the admin dashboard's API base URL; GIT_SHA powers /version.
          build-args: |
            BACKEND_PUBLIC_URL=${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            GIT_SHA=${{ github.sha }}

      - name: Create smoke database
        run: |
          export PGPASSWORD=postgres
          psql -h localhost -U postgres -d postgres -v ON_ERROR_STOP=1 \
            -c "CREATE DATABASE smoke_db;"

      # Pre-migrate so init-backend's checkIfSeeded sees the schema and SKIPS
      # seeding — mirroring production's already-seeded boot path.
      - name: Pre-migrate the smoke database
        env:
          SMOKE_DB_URL: postgres://postgres:postgres@localhost:5432/smoke_db?sslmode=disable
        run: |
          docker run --rm --network host \
            -e DATABASE_URL="$SMOKE_DB_URL" \
            -e JWT_SECRET=smoke -e COOKIE_SECRET=smoke \
            -e MOLONI_CLIENT_ID=dummy -e MOLONI_CLIENT_SECRET=dummy \
            -e MOLONI_USER=dummy -e MOLONI_PASSWORD=dummy -e MOLONI_COMPANY_ID=1 \
            -w /app/.medusa/server --entrypoint sh backend:ci \
            -c "./node_modules/.bin/medusa db:migrate"

      - name: Boot backend image and assert /health
        env:
          SMOKE_DB_URL: postgres://postgres:postgres@localhost:5432/smoke_db?sslmode=disable
        run: |
          docker run -d --name backend-smoke --network host \
            -e DATABASE_URL="$SMOKE_DB_URL" \
            -e JWT_SECRET=smoke -e COOKIE_SECRET=smoke \
            -e MEDUSA_ADMIN_EMAIL=admin@smoke.test -e MEDUSA_ADMIN_PASSWORD=supersecret123 \
            -e STORE_CORS=http://localhost:8000 \
            -e ADMIN_CORS=http://localhost:9000 \
            -e AUTH_CORS=http://localhost:9000 \
            -e MOLONI_CLIENT_ID=dummy -e MOLONI_CLIENT_SECRET=dummy \
            -e MOLONI_USER=dummy -e MOLONI_PASSWORD=dummy -e MOLONI_COMPANY_ID=1 \
            backend:ci
          echo "Waiting for backend image health…"
          npx --yes wait-on -t 180000 http://localhost:9000/health
          echo "Backend image booted healthy."

      - name: Backend image logs on failure
        if: failure()
        run: docker logs backend-smoke 2>&1 | tail -n 200 || true

      # Push the already-built image (master push only, after the boot passed).
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker push --all-tags ghcr.io/${{ github.repository }}/backend

  # ── Storefront image: build once → boot-smoke → push ───────────────────────
  storefront-image:
    name: Storefront image (build · boot · push)
    needs: [changes]
    if: needs.changes.outputs.storefront == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/storefront
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      # Build ONCE (load). NEXT_PUBLIC_* are inlined at build time → must match
      # production. Set as repo-level Actions *Variables* (public, not secrets).
      # Missing NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY fails the build by design.
      - name: Build storefront image (load)
        uses: docker/build-push-action@v6
        with:
          context: storefront
          load: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            storefront:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=storefront
          cache-to: type=gha,mode=max,scope=storefront
          build-args: |
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_BASE_URL=${{ vars.NEXT_PUBLIC_BASE_URL }}
            NEXT_PUBLIC_DEFAULT_REGION=${{ vars.NEXT_PUBLIC_DEFAULT_REGION }}
            NEXT_PUBLIC_MINIO_ENDPOINT=${{ vars.NEXT_PUBLIC_MINIO_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_ENDPOINT=${{ vars.NEXT_PUBLIC_SEARCH_ENDPOINT }}
            NEXT_PUBLIC_SEARCH_API_KEY=${{ vars.NEXT_PUBLIC_SEARCH_API_KEY }}
            NEXT_PUBLIC_INDEX_NAME=${{ vars.NEXT_PUBLIC_INDEX_NAME }}
            GIT_SHA=${{ github.sha }}

      # Boot proves `next start` comes up in the pruned image (catches runtime
      # deps misfiled as devDependencies). Any HTTP status proves it booted; 000
      # means the process crashed.
      - name: Boot storefront image and assert it serves
        run: |
          docker run -d --name storefront-smoke --network host \
            -e PORT=8000 storefront:ci
          echo "Waiting for storefront to listen…"
          npx --yes wait-on -t 120000 tcp:127.0.0.1:8000
          code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 || echo 000)
          echo "storefront / -> HTTP $code"
          test "$code" != "000"

      - name: Storefront image logs on failure
        if: failure()
        run: docker logs storefront-smoke 2>&1 | tail -n 200 || true

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push storefront image
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker push --all-tags ghcr.io/${{ github.repository }}/storefront

  # ── Deploy ───────────────────────────────────────────────────────────────
  # Railway services have GHCR image auto-updates enabled, but the poll can lag
  # 10+ min after a push. This job nudges Railway to pull the freshly-published
  # :latest immediately via `railway redeploy --from-source`. Auto-update stays
  # on as the fallback. Requires a RAILWAY_TOKEN repo secret; if absent the job
  # no-ops with a warning and the auto-update poll still deploys (just slower).
  deploy:
    name: Force Railway redeploy
    needs: [changes, backend-image, storefront-image]
    # Runs if EITHER image job published (the other may be skipped for a single-app
    # change). Only redeploys the service(s) whose image was rebuilt.
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
      && (needs.backend-image.result == 'success' || needs.storefront-image.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: "scintillating-adaptation / production"
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      DEPLOY_BACKEND: ${{ needs.changes.outputs.backend }}
      DEPLOY_STOREFRONT: ${{ needs.changes.outputs.storefront }}
    steps:
      - name: Redeploy changed services (pull freshly-pushed :latest)
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping force-deploy. Railway image auto-update will pull the new :latest on its next poll (slower)."
            exit 0
          fi
          npm install -g @railway/cli
          svcs=()
          [ "$DEPLOY_BACKEND" = "true" ] && svcs+=("${{ vars.RAILWAY_BACKEND_SERVICE }}")
          [ "$DEPLOY_STOREFRONT" = "true" ] && svcs+=("${{ vars.RAILWAY_STOREFRONT_SERVICE }}")
          for svc in "${svcs[@]}"; do
            echo "Redeploying $svc from configured image source…"
            railway redeploy --service "$svc" --from-source -y
          done

      - name: Wait until prod reports the new commit
        env:
          GIT_SHA: ${{ github.sha }}
          BACKEND_URL: ${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          STOREFRONT_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
        run: |
          poll() {
            url="$1"; label="$2"
            echo "Waiting for $label to report ${GIT_SHA} ($url)…"
            for i in $(seq 1 72); do
              live=$(curl -fsS -A "Mozilla/5.0" -H "Cache-Control: no-cache" "$url?cb=$i" 2>/dev/null \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
              if [ "$live" = "$GIT_SHA" ]; then echo "✓ $label live ($live)"; return 0; fi
              echo "  [$i/72] $label sha=${live:-<none>} — retry in 15s"
              sleep 15
            done
            echo "::error::$label never reported $GIT_SHA — deploy not live in time"
            return 1
          }
          [ "$DEPLOY_BACKEND" = "true" ] && poll "$BACKEND_URL/version" backend
          [ "$DEPLOY_STOREFRONT" = "true" ] && poll "$STOREFRONT_URL/api/healthcheck" storefront
          echo "Prod is serving ${GIT_SHA}."

  # ── Production e2e (post-deploy) ───────────────────────────────────────────
  # Runs only after `deploy` confirmed the new commit is live on prod. Strictly
  # read-only against production data; authenticates through the pre-launch
  # access gate with STOREFRONT_ACCESS_TOKEN.
  e2e-prod:
    name: Production e2e (post-deploy)
    needs: [changes, deploy]
    if: >-
      always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
      && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          cache-dependency-path: storefront/pnpm-lock.yaml

      - name: Install storefront deps
        working-directory: storefront
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: storefront
        run: pnpm exec playwright install --with-deps chromium

      - name: Run read-only prod e2e
        working-directory: storefront
        env:
          NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${{ vars.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
          NEXT_PUBLIC_DEFAULT_REGION: ${{ vars.NEXT_PUBLIC_DEFAULT_REGION }}
          STOREFRONT_ACCESS_TOKEN: ${{ secrets.STOREFRONT_ACCESS_TOKEN }}
        run: pnpm test-e2e:prod

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: prod-playwright-report
          path: storefront/playwright-report
          retention-days: 7
